<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
  <title id="title">Skier tracking data pipeline</title>
  <desc id="desc">A five-stage pipeline from video capture through detection, tracking, quality metrics, and human review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1830" />
      <stop offset="1" stop-color="#103c47" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45d6c2" />
      <stop offset="1" stop-color="#f6ae2d" />
    </linearGradient>
    <pattern id="snow" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#dceef6" opacity="0.16" />
    </pattern>
    <style>
      .flow { stroke-dasharray: 9 10; animation: flow 3s linear infinite; }
      .node { animation: pulse 2.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes flow { to { stroke-dashoffset: -76; } }
      @keyframes pulse { 0%, 100% { opacity: .75; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .flow, .node { animation: none; } }
    </style>
  </defs>
  <rect width="800" height="430" rx="22" fill="url(#bg)" />
  <rect width="800" height="430" rx="22" fill="url(#snow)" />
  <path d="M0 335 L120 242 L211 301 L337 177 L468 276 L604 121 L800 286 L800 430 L0 430Z" fill="#dceef6" opacity="0.08" />
  <text x="54" y="72" fill="#f5f8fa" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="750">SKIER TRACKING</text>
  <text x="54" y="106" fill="#9db8c8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">Computer vision → diagnostics → human review</text>
  <path class="flow" d="M112 230 H688" fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" />
  <g font-family="Segoe UI, Inter, Arial, sans-serif" text-anchor="middle">
    <g class="node">
      <circle cx="112" cy="230" r="36" fill="#112f49" stroke="#45d6c2" stroke-width="3" />
      <path d="M98 217 L126 230 L98 243Z" fill="#45d6c2" />
      <text x="112" y="292" fill="#dceef6" font-size="16" font-weight="650">VIDEO</text>
    </g>
    <g class="node">
      <circle cx="256" cy="230" r="36" fill="#112f49" stroke="#57c8ba" stroke-width="3" />
      <rect x="238" y="214" width="36" height="31" rx="4" fill="none" stroke="#57c8ba" stroke-width="3" />
      <path d="M245 214 V207 M267 214 V207 M245 245 V252 M267 245 V252" stroke="#57c8ba" stroke-width="3" />
      <text x="256" y="292" fill="#dceef6" font-size="16" font-weight="650">DETECT</text>
    </g>
    <g class="node">
      <circle cx="400" cy="230" r="36" fill="#112f49" stroke="#80c0a1" stroke-width="3" />
      <path d="M382 240 C391 217, 407 217, 419 224 M419 224 L413 214 M419 224 L408 227" fill="none" stroke="#80c0a1" stroke-width="3" stroke-linecap="round" />
      <text x="400" y="292" fill="#dceef6" font-size="16" font-weight="650">TRACK</text>
    </g>
    <g class="node">
      <circle cx="544" cy="230" r="36" fill="#112f49" stroke="#c6b765" stroke-width="3" />
      <rect x="526" y="223" width="7" height="19" rx="2" fill="#c6b765" />
      <rect x="538" y="214" width="7" height="28" rx="2" fill="#c6b765" />
      <rect x="550" y="205" width="7" height="37" rx="2" fill="#c6b765" />
      <text x="544" y="292" fill="#dceef6" font-size="16" font-weight="650">METRICS</text>
    </g>
    <g class="node">
      <circle cx="688" cy="230" r="36" fill="#112f49" stroke="#f6ae2d" stroke-width="3" />
      <path d="M670 231 L682 243 L706 216" fill="none" stroke="#f6ae2d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="688" y="292" fill="#dceef6" font-size="16" font-weight="650">REVIEW</text>
    </g>
  </g>
  <text x="400" y="374" text-anchor="middle" fill="#8fa9b9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16">Quality signals stay visible. Humans remain in the loop.</text>
</svg>
