<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Ian MacDonnell — Product-minded builder</title>
  <desc id="desc">A dark navy banner with a mobile interface, connected data nodes, and subtle animated signals representing mobile, AI, and data systems.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426" />
      <stop offset="0.52" stop-color="#102542" />
      <stop offset="1" stop-color="#0d2e35" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42d6c5" />
      <stop offset="1" stop-color="#f6ae2d" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8fb3c9" stroke-opacity="0.07" stroke-width="1" />
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <style>
      .signal { stroke-dasharray: 9 12; animation: flow 3.5s linear infinite; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.4s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      .float-delay { animation: float 5s ease-in-out 1.2s infinite; }
      @keyframes flow { to { stroke-dashoffset: -84; } }
      @keyframes pulse { 0%, 100% { opacity: .55; transform: scale(.82); } 50% { opacity: 1; transform: scale(1.18); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @media (prefers-reduced-motion: reduce) { .signal, .pulse, .float, .float-delay { animation: none; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)" />
  <rect width="1200" height="360" rx="24" fill="url(#grid)" />
  <circle cx="1100" cy="50" r="180" fill="#42d6c5" opacity="0.035" />
  <circle cx="80" cy="330" r="190" fill="#f6ae2d" opacity="0.035" />

  <!-- Mobile workflow -->
  <g transform="translate(70 48)">
    <g class="float">
    <rect x="0" y="0" width="150" height="264" rx="26" fill="#09182b" stroke="#7aa5bd" stroke-opacity="0.7" stroke-width="2" />
    <rect x="14" y="29" width="122" height="205" rx="14" fill="#112c43" />
    <rect x="55" y="12" width="40" height="5" rx="3" fill="#7895a8" />
    <circle cx="75" cy="248" r="7" fill="none" stroke="#7895a8" stroke-width="2" />
    <rect x="31" y="49" width="88" height="11" rx="5.5" fill="#42d6c5" opacity="0.9" />
    <rect x="31" y="75" width="59" height="7" rx="3.5" fill="#d7e8ef" opacity="0.72" />
    <rect x="31" y="94" width="77" height="7" rx="3.5" fill="#d7e8ef" opacity="0.35" />
    <rect x="31" y="123" width="88" height="45" rx="9" fill="#183d55" stroke="#42d6c5" stroke-opacity="0.36" />
    <path d="M43 152 L58 139 L72 148 L94 132 L108 143" fill="none" stroke="#f6ae2d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="31" y="186" width="88" height="28" rx="8" fill="url(#accent)" opacity="0.9" />
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(270 88)">
    <text x="0" y="0" fill="#9fb7c7" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="3">HELLO, I'M</text>
    <text x="0" y="66" fill="#f5f8fa" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="750" letter-spacing="0.5">IAN MACDONNELL</text>
    <rect x="0" y="88" width="520" height="4" rx="2" fill="url(#accent)" />
    <text x="0" y="135" fill="#c7d9e4" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="500">Product-minded builder across</text>
    <text x="0" y="174" fill="#42d6c5" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28" font-weight="700">MOBILE  •  AI  •  DATA SYSTEMS</text>
    <text x="0" y="219" fill="#91aabc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17">Cal Poly SLO  /  Information Systems  /  Planned CS Minor</text>
  </g>

  <!-- Connected system -->
  <g transform="translate(855 56)">
    <g class="float-delay">
    <path d="M45 91 C85 24, 176 25, 214 88 S276 179, 212 224 C161 260, 77 239, 51 184 C34 148, 27 119, 45 91Z" fill="#0c2035" stroke="#5d879f" stroke-opacity="0.65" stroke-width="2" />
    <path class="signal" d="M74 107 C116 68, 151 70, 181 102 S216 160, 188 190 C161 219, 114 210, 91 176" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" />
    <path d="M74 107 L91 176 L188 190 L181 102 Z" fill="none" stroke="#7aa5bd" stroke-opacity="0.28" stroke-width="1.5" />
    <g filter="url(#glow)">
      <circle cx="74" cy="107" r="8" fill="#42d6c5" />
      <circle cx="181" cy="102" r="8" fill="#f6ae2d" />
      <circle cx="188" cy="190" r="8" fill="#42d6c5" />
      <circle cx="91" cy="176" r="8" fill="#f6ae2d" />
      <circle class="pulse" cx="135" cy="145" r="21" fill="none" stroke="#f5f8fa" stroke-opacity="0.55" stroke-width="2" />
      <circle cx="135" cy="145" r="15" fill="#f5f8fa" />
    </g>
    <circle r="5" fill="#f5f8fa" filter="url(#glow)">
      <animateMotion dur="3.8s" repeatCount="indefinite" path="M74 107 C116 68, 151 70, 181 102 S216 160, 188 190 C161 219, 114 210, 91 176" />
    </circle>
    <text x="135" y="150" text-anchor="middle" fill="#102542" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="800">BUILD</text>
    </g>
  </g>
</svg>
